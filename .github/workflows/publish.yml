name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (leave empty to use package.json version)"
        required: false
        type: string

# Best practices from npm docs: https://docs.npmjs.com/trusted-publishers
permissions:
  id-token: write   # Required for OIDC Trusted Publishing
  contents: write   # Required for GitHub releases
  pull-requests: read  # For checkout

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Use Node.js 24 which includes npm 11+ with full Trusted Publishing support
      # https://docs.npmjs.com/trusted-publishers
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npx @biomejs/biome check .
          npx tsx --test test/**/*.test.ts
          npx tsc --noEmit --skipLibCheck

      - name: Bump version (if specified)
        if: github.event.inputs.version != ''
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
          git push

      # npm automatically detects OIDC and publishes with provenance
      # No --provenance flag needed - it's automatic with Trusted Publishing
      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
